# hooks.yml
# Optional hooks executed before or after Reversa's forward skills.
#
# Schema per hook:
#   command:     command that will be suggested (optional: true) or required (optional: false)
#   description: short text displayed to the user
#   enabled:     true | false. If this field is absent, defaults to true.
#   optional:    true (presents a clickable link) | false (runs automatically and waits)
#
# Rules:
#   Invalid YAML here is tolerated: the skill continues normally, just without hooks.
#   There is no condition DSL in this file. If a hook should not run, use enabled: false.
#
# By default, all hooks arrive empty. Add only those that make sense for your project.

schema-version: 1

# Hooks for /reversa-requirements
before-requirements: []
after-requirements: []

